version: '3.8'
services:
  database:
    image: mongo:latest
    container_name: thrift_db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: thrift_api
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://database:27017/moneythrift
    depends_on:
      - database
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: thrift_ui
    ports:
      - "80:80"
    depends_on:
      - backend
volumes:
  mongo-data:
